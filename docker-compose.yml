services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vezanie-web
    ports:
      - "5001:5000"
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: sqlite:////data/orders.db
    volumes:
      - vezanie-data:/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  vezanie-data:
